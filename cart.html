<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart & Checkout | The Brownie Bar</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <div class="logo" onclick="window.location.href='index.html'">The Brownie Bar</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="menu.html">Our Brownies</a>
      <a href="cart.html"
        style="position: relative; font-weight: bold; background: var(--primary); color: #fff; padding: 6px 12px; border-radius: 20px; display: inline-flex; align-items: center; gap: 6px; text-decoration: none;">
        🛒 Cart
        <span id="cartCounterBadge" style="background: red; color: white; font-size: 0.75rem; font-weight: bold; padding: 2px 6px; border-radius: 10px; min-width: 14px; text-align: center; display: none;">0</span>
      </a>
    </nav>
  </header>

  <main style="max-width: 800px; margin: 40px auto; padding: 20px; flex: 1;">
    <h2 style="color: var(--primary); margin-bottom: 20px;">🛒 Your Shopping Cart</h2>

    <!-- Interactive Multi-Item Product Table Grid -->
    <table
      style="width: 100%; border-collapse: collapse; margin-bottom: 20px; background: white; border-radius: 6px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
      <thead>
        <tr style="background: var(--primary); color: white;">
          <th style="padding: 12px; text-align: left;">Flavors Selection</th>
          <th style="padding: 12px; text-align: center; width: 80px;">Qty</th>
          <th style="padding: 12px; text-align: right; width: 100px;">Price</th>
          <th style="padding: 12px; text-align: right; width: 120px;">Total</th>
        </tr>
      </thead>
      <tbody id="checkoutCartTable">
        <!-- Injected dynamically by app.js -->
      </tbody>
    </table>

    <!-- Live Financial Summary Metrics (Australian GST Inclusive) -->
    <div
      style="background: white; padding: 20px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 25px; text-align: right;">
      <p style="margin: 4px 0;">Subtotal (ex. GST):
        <span id="cartSummarySubtotal" style="font-weight: bold;">$0.00</span></p>
      <p style="margin: 4px 0; font-size: 0.9rem; color: #666;">Included 10% GST component:
        <span id="cartSummaryTax">$0.00</span></p>
      <h3 style="margin: 10px 0 0 0; color: var(--primary);">Estimated Total (Inc. GST):
        <span id="cartSummaryTotal">$0.00</span></h3>
    </div>

    <!-- Combined Fulfillment Details & Order Placement Form -->
    <form id="globalCartCheckoutForm"
      style="background: white; padding: 25px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px;">
      <h3 style="margin-top: 0; color: var(--primary); border-bottom: 2px solid #f2ede6; padding-bottom: 8px;">📋
        Fulfillment Details</h3>

      <label style="display: block; margin-top: 15px; margin-bottom: 12px;">
                <strong>School Account Email Address:</strong>
                <input type="email" id="emailInput" required placeholder="your.name@school.edu.au" style="width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
            </label>

      <label style="display: block; margin-bottom: 20px;">
                <strong>Select Stall Fast-Pass Day & Time Slot:</strong>
                <select id="pickupDay" required style="width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
                    <option value="Monday Recess">Monday Recess — Original Flavor Stall</option>
                    <option value="Tuesday Recess">Tuesday Recess — Salted Caramel Stall</option>
                    <option value="Wednesday Recess">Wednesday Recess — Nutella Infused Stall</option>
                </select>
            </label>

      <div
        style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px; border-top: 1px solid #f2ede6; padding-top: 20px; gap: 15px;">
        <a href="menu.html"
          style="flex: 1; display: flex; align-items: center; justify-content: center; box-sizing: border-box; text-align: center; background: #eee; color: #333; font-weight: 600; font-size: 0.95rem; letter-spacing: 0.5px; height: 50px; margin: 0; border: none; border-radius: 50px; text-decoration: none; cursor: pointer; transition: background-color 0.2s; vertical-align: middle;"
          onmouseover="this.style.background='#e0e0e0'" onmouseout="this.style.background='#eee'">
          Continue Shopping
        </a>
        <button type="submit" class="btn" style="flex: 1; display: flex; align-items: center; justify-content: center; box-sizing: border-box; background: #2e7d32; color: white; font-weight: 600; font-size: 0.95rem; letter-spacing: 0.5px; height: 50px; margin: 0; padding: 0; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 2px 8px rgba(46, 125, 50, 0.2); transition: background-color 0.2s; vertical-align: middle;" onmouseover="this.style.background='#256428'" onmouseout="this.style.background='#2e7d32'">
              Secure Pre-Order Reservation
          </button>
      </div>
    </form>
  </main>

  <script src="app.js"></script>
</body>

</html>
