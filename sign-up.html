<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join the Club | The Brownie Bar</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <div class="logo" onclick="window.location.href='index.html'">The Brownie Bar</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="menu.html">Our Brownies</a>
      <a href="signup.html">Join the Club</a>
    </nav>
  </header>

  <main style="text-align: center; padding: 20px; flex: 1;">
    <h1 style="color: var(--primary); margin-top: 30px; margin-bottom: 5px;">Join the Club</h1>
    <p style="max-width: 500px; margin: 0 auto 25px;">
      Subscribe to receive secret discount drops, priority alerts on baking schedules, and monthly free-slice raffles!
    </p>

    <div class="form-container">
      <form id="signupForm">
        <div class="form-group">
          <label for="userName">First Name</label>
          <input type="text" id="userName" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label for="userEmail">Email Address</label>
          <input type="email" id="userEmail" placeholder="you@outlook.com" required
                           pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                           title="Please enter a valid email address (e.g. name@domain.com)">
        </div>
        <button type="submit" class="btn" aria-label="Submit registration details">Sign Me Up!</button>
      </form>
    </div>
  </main>

  <footer>&copy; 2026 The Brownie Bar. Handcrafted Decadence.</footer>
  <script src="app.js"></script>
</body>

</html>
